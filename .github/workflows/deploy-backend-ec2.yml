name: Deploy Backend to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/exportnavi_ec2
          chmod 600 ~/.ssh/exportnavi_ec2
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload backend source
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          tar \
            --exclude='.git' \
            --exclude='Frontend/node_modules' \
            --exclude='Backend/.gradle' \
            --exclude='Backend/build' \
            --exclude='Backend/.env' \
            --exclude='Backend/.env.production' \
            -czf /tmp/exportnavi-backend.tar.gz .
          ssh -i ~/.ssh/exportnavi_ec2 "$EC2_USER@$EC2_HOST" 'mkdir -p ~/exportnavi'
          scp -i ~/.ssh/exportnavi_ec2 /tmp/exportnavi-backend.tar.gz "$EC2_USER@$EC2_HOST:~/exportnavi/exportnavi-backend.tar.gz"
          ssh -i ~/.ssh/exportnavi_ec2 "$EC2_USER@$EC2_HOST" 'cd ~/exportnavi && tar -xzf exportnavi-backend.tar.gz'

      - name: Start backend with Docker Compose
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/exportnavi_ec2 "$EC2_USER@$EC2_HOST" '
            cd ~/exportnavi/Backend
            test -f .env.production
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
          '
