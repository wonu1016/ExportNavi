services:

  # ---- MySQL 컨테이너 ----
  mysql:
    image: mysql:8.0                  # Docker Hub에서 MySQL 8.0 이미지를 가져옴
    container_name: exportnavi-mysql   # 컨테이너 이름 (docker ps에서 보이는 이름)
    restart: unless-stopped            # 크래시 시 자동 재시작, 수동 stop은 유지

    ports:
      - "3307:3306"                    # 호스트 3307 → 컨테이너 3306 포트 매핑
                                       # Spring Boot가 localhost:3307으로 접근 가능

    environment:                       # MySQL 초기 설정 (환경변수)
      MYSQL_ROOT_PASSWORD: root1234    # root 계정 비밀번호
      MYSQL_DATABASE: exportnavi       # 컨테이너 시작 시 자동 생성할 DB 이름
      MYSQL_USER: exportnavi           # 앱 전용 계정
      MYSQL_PASSWORD: exportnavi1234   # 앱 전용 계정 비밀번호

    volumes:
      - mysql-data:/var/lib/mysql      # 이 줄이 없으면 docker compose down 할 때 DB 데이터 전부 날아감
                                       # 'mysql-data'라는 이름의 볼륨에 영구 저장

    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
                                       # 한글 깨짐 방지 (UTF-8)

# ---- 볼륨 정의 ----
# 위에서 사용한 'mysql-data' 볼륨을 여기서 선언
# Docker가 관리하는 영역에 데이터가 저장됨
volumes:
  mysql-data:
