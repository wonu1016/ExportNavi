spring.application.name=ExportNavi
server.port=8082

# ---- MySQL (Docker) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/exportnavi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:exportnavi}
spring.datasource.password=${DB_PASSWORD:exportnavi1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Google OAuth 2.0 ----
spring.security.oauth2.client.registration.google.client-id=10800490282-hfnek77knjp7u5mgigbc1lqadf6tlt3v.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ---- JWT ----
jwt.secret=${JWT_SECRET:exportnavi-jwt-secret-key-for-development-only-change-in-production-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ---- Frontend ----
app.frontend.url=${FRONTEND_URL:http://localhost:5175}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

# ---- OpenAI API ----
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=${OPENAI_MODEL:gpt-5.4-mini}
app.ai.max-requests-per-hour=${AI_MAX_REQUESTS_PER_HOUR:20}

# ---- Upstage API (향후 문서/OCR 기능용) ----
upstage.api.key=${UPSTAGE_API_KEY:}

# ---- LangSmith tracing (연동 라이브러리 추가 전까지 설정값만 보관) ----
langsmith.tracing=${LANGSMITH_TRACING:false}
langsmith.endpoint=${LANGSMITH_ENDPOINT:https://api.smith.langchain.com/}
langsmith.api.key=${LANGSMITH_API_KEY:}
langsmith.project=${LANGSMITH_PROJECT:exportnavi}

# ---- 공공데이터 API (data.go.kr) ----
kotra.api.key=${KOTRA_API_KEY:}
ksure.api.key=${KSURE_API_KEY:}
yestrade.api.key=${YESTRADE_API_KEY:}

# ---- Multipart upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
